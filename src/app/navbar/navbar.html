    <ul class="nav-links" #navLinks>
      <div class="nav-indicator" #navIndicator></div>

      <li>
        <a href="#" (click)="scrollToSection('about', $event); setActive($event)" [class.active]="activeSection === 'about'">ABOUT</a>

        <a href="/contact" (click)="scrollToSection('contact', $event); setActive($event)" [class.active]="activeSection === 'contact'">CONTACT</a>
      </li>
    </ul>

    <button class="dark-mode eclipse-toggle" (click)="toggleTheme()" [class.is-dark]="isDarkMode" aria-label="Toggle theme">
      <svg class="eclipse-svg" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <mask id="eclipseMask">
            <rect width="36" height="36" fill="white"/>
            <circle class="eclipse-moon-mask" cx="28" cy="18" r="8" fill="black"/>
          </mask>
        </defs>
        <!-- Sun rays -->
        <g class="eclipse-rays">
          <line x1="18" y1="1"  x2="18" y2="5"  stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="18" y1="31" x2="18" y2="35" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="1"  y1="18" x2="5"  y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="31" y1="18" x2="35" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="4.5"  y1="4.5"  x2="7.3"  y2="7.3"  stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="28.7" y1="28.7" x2="31.5" y2="31.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="31.5" y1="4.5"  x2="28.7" y2="7.3"  stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="4.5"  y1="31.5" x2="7.3"  y2="28.7" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </g>
        <!-- Sun body (masked by moon) -->
        <circle cx="18" cy="18" r="8" fill="white" mask="url(#eclipseMask)"/>
        <!-- Corona ring — glows during eclipse -->
        <circle class="eclipse-corona" cx="18" cy="18" r="9" fill="none" stroke="rgba(255,210,60,0)" stroke-width="2.5"/>
        <!-- Moon disc -->
        <circle class="eclipse-moon-disc" cx="28" cy="18" r="8" fill="rgba(210,220,240,0.12)"/>
      </svg>
    </button>

        </li>
        <li>
          <a href="#" (click)="scrollToSection('projects', $event); setActive($event); closeMenu()" [class.active]="activeSection === 'projects'">PROJECTS</a>

        </li>
        <li>

        </li>
